<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - SoulUp</title>
    <link rel="stylesheet" href="./css/contato.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>Soul<span>Up</span></h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="meu-avatar.html">Meu avatar</a>
            <a href="quem-somos.html">Quem Somos</a>
            <a href="sobre.html">Sobre</a>
            <a href="faq.html">FAQ</a>
            <a href="#" class="active">Contato</a>
        </nav>
    </header>

    <main class="content-wrapper">
        <section class="contact-card">
            <h2>Fale Conosco</h2>
            <form action="#" class="contact-form" onsubmit="alert('Simulação de envio realizada com sucesso!'); return false;">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" required placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seuemail@provedor.com">
                </div>
                <div class="form-group">
                    <label for="subject">Assunto</label>
                    <select id="subject">
                        <option value="suporte">Suporte Técnico do Avatar</option>
                        <option value="pontos">Problemas com Pontuação</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" rows="5" required placeholder="Escreva aqui..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 SoulUp & FIAP Challenge. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
